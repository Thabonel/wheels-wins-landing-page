name: Deploy Backend to Staging

on:
  push:
    branches: [ staging ]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-staging-deploy.yml'
  workflow_dispatch:  # Allow manual triggers

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      working-directory: ./backend
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Run backend tests
      continue-on-error: true
      working-directory: ./backend
      env:
        ANTHROPIC_API_KEY: "<ANTHROPIC_TOKEN>"
        GEMINI_API_KEY: "<GOOGLE_TOKEN>"
        SUPABASE_URL: "https://testproject.supabase.co"
        SUPABASE_SERVICE_ROLE_KEY: "test-service-role-key-for-ci-only-not-real-abcdefghijklmnopqrstuvwxyz"
        DATABASE_URL: "postgresql://test:test@localhost:5432/test"
        SECRET_KEY: "test-secret-key-for-ci-only-not-real-abcdefghijklmnopqrstuvwxyz1234"
        NODE_ENV: "testing"
      run: |
        python -m pytest tests/unit/ -v --tb=short --no-cov -o "addopts="
        
    - name: Deploy to Render
      continue-on-error: true
      env:
        RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
        RENDER_SERVICE_ID: ${{ secrets.RENDER_STAGING_SERVICE_ID }}
      run: |
        set -euo pipefail

        DEPLOY_RESPONSE=$(curl --fail --show-error --silent -X POST \
          "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys" \
          -H "Accept: application/json" \
          -H "Authorization: Bearer ${RENDER_API_KEY}" \
          -H "Content-Type: application/json" \
          -d '{"clearCache": "clear"}')

        DEPLOY_ID=$(python -c '
        import json, os, sys
        data = json.loads(os.environ["DEPLOY_RESPONSE"])
        deploy = data.get("deploy", data)
        deploy_id = deploy.get("id")
        if not deploy_id:
            print(json.dumps(data, indent=2), file=sys.stderr)
            raise SystemExit("Render deploy response did not include a deploy id")
        print(deploy_id)
        ')
        
        echo "RENDER_DEPLOY_ID=${DEPLOY_ID}" >> "$GITHUB_ENV"
        echo "✅ Deployment triggered for staging backend: ${DEPLOY_ID}"
        
    - name: Wait for deployment
      env:
        RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
        RENDER_SERVICE_ID: ${{ secrets.RENDER_STAGING_SERVICE_ID }}
      run: |
        set -euo pipefail

        # If the trigger step failed (e.g., Render auto-deploy handles the push),
        # there is no deploy ID to poll. Skip API polling and let the health check
        # verify the actual deployed state.
        if [ -z "${RENDER_DEPLOY_ID:-}" ]; then
          echo "⚠️ No Render deploy ID from trigger; skipping Render API polling"
          exit 0
        fi

        echo "⏳ Waiting for deployment ${RENDER_DEPLOY_ID} to complete..."
        sleep 30  # Initial wait
        
        for i in {1..40}; do
          DEPLOY_RESPONSE=$(curl --fail --show-error --silent \
            "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys/${RENDER_DEPLOY_ID}" \
            -H "Accept: application/json" \
            -H "Authorization: Bearer ${RENDER_API_KEY}")

          STATUS=$(DEPLOY_RESPONSE="$DEPLOY_RESPONSE" python -c 'import json, os, sys; data=json.loads(os.environ["DEPLOY_RESPONSE"]); deploy=data.get("deploy", data); print(deploy.get("status", "unknown")); sys.exit(0)' || echo "unknown")
          
          if [ "$STATUS" = "live" ]; then
            echo "✅ Deployment successful!"
            exit 0
          fi

          if [[ "$STATUS" == *failed || "$STATUS" == "canceled" ]]; then
            echo "❌ Render deployment failed with status: $STATUS"
            exit 1
          fi
          
          echo "Status: $STATUS - waiting..."
          sleep 15
        done

        echo "❌ Timed out waiting for Render deploy ${RENDER_DEPLOY_ID}"
        exit 1
        
    - name: Health check
      run: |
        set -euo pipefail

        HEALTH_URL="https://wheels-wins-backend-staging.onrender.com/api/v2/pam/health"

        for i in {1..30}; do
          if HEALTH_RESPONSE=$(curl --fail --show-error --silent "$HEALTH_URL" 2>/dev/null); then
            if HEALTH_RESPONSE="$HEALTH_RESPONSE" python -c 'import json, os, sys; data=json.loads(os.environ["HEALTH_RESPONSE"]); sys.exit(0 if data.get("pam_v2_enabled") is True else 1)'; then
              echo "✅ Pam V2 health check passed"
              exit 0
            fi
            echo "⚠️ Pam V2 health check returned disabled state: $HEALTH_RESPONSE"
          fi
          echo "Health check not ready yet, waiting..."
          sleep 10
        done

        echo "❌ Pam V2 health check did not pass in time"
        exit 1
